<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sizzle | Daily Check-in</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: '#E10101',
                            dark: '#BC0000',
                        },
                        brand: {
                            primary: '#E10101',
                            secondary: '#7d0000',
                            accent: '#ff3d3d',
                        },
                        secondary: '#64748b',
                        gray: {
                            200: '#E5E5E5',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Theme Initialization -->
    <script>
        if (localStorage.getItem('theme') === 'dark' ||
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .emoji-option.selected {
            border-color: theme('colors.primary.DEFAULT');
            background-color: rgba(225, 1, 1, 0.05);
        }

        .dark .emoji-option.selected {
            background-color: rgba(225, 1, 1, 0.2);
        }
    </style>
</head>

<body
    class="bg-gray-50 dark:bg-slate-900 min-h-screen flex flex-col items-center text-slate-900 dark:text-white transition-colors duration-300">
    <!-- Header -->
    <header
        class="fixed top-0 left-0 right-0 z-50 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-gray-200 dark:border-slate-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <nav class="flex items-center justify-between h-16">
                <div class="flex items-center gap-2">
                    <a href="/" class="flex items-center gap-2">
                        <img src="/assets/images/owasp-blt-logo.svg" alt="OWASP BLT Logo" class="h-8 w-auto">
                        <span class="font-bold text-xl tracking-tight hidden sm:block">SIZZLE</span>
                    </a>
                </div>

                <div class="hidden md:flex items-center gap-8">
                    <a href="/" class="text-primary font-bold">Check-in</a>
                    <a href="/leaderboard"
                        class="text-slate-600 dark:text-slate-300 hover:text-primary transition-colors font-medium">Leaderboard</a>
                    <a href="/time-logs"
                        class="text-slate-600 dark:text-slate-300 hover:text-primary transition-colors font-medium">Time
                        Logs</a>
                    <a href="/settings"
                        class="text-slate-600 dark:text-slate-300 hover:text-primary transition-colors font-medium">Settings</a>
                </div>

                <div class="flex items-center gap-4">
                    <button id="themeToggle"
                        class="p-2 text-slate-500 hover:text-primary dark:text-slate-400 dark:hover:text-primary transition-colors">
                        <svg id="sunIcon" class="hidden w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
                            <path fill-rule="evenodd"
                                d="M10 18a.8.8 0 01-.8-.8V16.7a.8.8 0 111.6 0v.5a.8.8 0 01-.8.8zm8-8a.8.8 0 01-.8.8h-.5a.8.8 0 110-1.6h.5a.8.8 0 01.8.8zM10 2a.8.8 0 01.8.8v.5a.8.8 0 11-1.6 0V2.8a.8.8 0 01.8-.8zm-8 8a.8.8 0 01.8-.8h.5a.8.8 0 110 1.6H2.8a.8.8 0 01-.8-.8zm14.5 4.5a.8.8 0 010 1.1l-.4.4a.8.8 0 11-1.1-1.1l.4-.4a.8.8 0 011.1 0zm-11-11a.8.8 0 010 1.1l-.4.4a.8.8 0 01-1.1-1.1l.4-.4a.8.8 0 011.1 0z"
                                clip-rule="evenodd" />
                        </svg>
                        <svg id="moonIcon" class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" />
                        </svg>
                    </button>
                    <!-- Mobile Menu Button -->
                    <button class="md:hidden p-2 text-slate-600 dark:text-slate-300">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16m-7 6h7"></path>
                        </svg>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <main class="pt-24 pb-12 px-4 w-full max-w-2xl">
        <div
            class="bg-white dark:bg-slate-800 rounded-3xl shadow-xl p-8 md:p-10 text-slate-800 dark:text-slate-100 animate-in fade-in duration-700 border border-gray-100 dark:border-slate-700">
            <header class="mb-8">
                <h1 class="text-4xl font-bold tracking-tight text-slate-900 dark:text-white mb-2">📝 Daily Check-in</h1>
                <p class="text-slate-500 dark:text-slate-400 text-lg">Share your progress and plan for today</p>
            </header>

            <div id="streakDisplay"
                class="hidden inline-flex items-center bg-primary/10 text-primary px-4 py-2 rounded-full font-bold text-sm mb-6 border border-primary/20 shadow-sm">
                <span class="mr-2">🔥</span> <span id="streakCount">0</span> Day Streak!
            </div>

            <div id="successMessage"
                class="hidden bg-emerald-500 text-white p-4 rounded-xl mb-6 shadow-md flex items-center gap-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
                Check-in submitted successfully!
            </div>

            <div id="errorMessage"
                class="hidden bg-rose-500 text-white p-4 rounded-xl mb-6 shadow-md flex items-center gap-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
                An error occurred. Please try again.
            </div>

            <form id="checkinForm" class="space-y-6">

                <div class="space-y-2">
                    <label for="previousWork" class="block text-sm font-bold text-slate-700 dark:text-slate-300">What
                        did you do since last check-in?</label>
                    <textarea id="previousWork" name="previousWork"
                        class="w-full p-4 border-2 border-slate-100 dark:border-slate-700 rounded-xl text-slate-700 dark:text-slate-200 focus:outline-none focus:border-primary transition-all duration-200 min-h-[120px] bg-slate-50 dark:bg-slate-900"
                        placeholder="Describe your accomplishments..."></textarea>
                </div>

                <div class="space-y-2">
                    <label for="todayPlan"
                        class="block text-sm font-bold text-slate-700 dark:text-slate-300 uppercase tracking-wider">What
                        do you plan to do today?</label>
                    <textarea id="todayPlan" name="todayPlan" required
                        class="w-full p-4 border-2 border-slate-100 dark:border-slate-700 rounded-xl text-slate-700 dark:text-slate-200 focus:outline-none focus:border-primary transition-all duration-200 min-h-[120px] bg-slate-50 dark:bg-slate-900 shadow-inner"
                        placeholder="Outline your plans..."></textarea>
                </div>

                <div class="space-y-2">
                    <label for="blockers" class="block text-sm font-bold text-slate-700 dark:text-slate-300">Any
                        blockers or challenges?</label>
                    <textarea id="blockers" name="blockers"
                        class="w-full p-4 border-2 border-slate-100 dark:border-slate-700 rounded-xl text-slate-700 dark:text-slate-200 focus:outline-none focus:border-primary transition-all duration-200 min-h-[100px] bg-slate-50 dark:bg-slate-900"
                        placeholder="None, or describe any obstacles..."></textarea>
                </div>

                <label
                    class="flex items-center gap-3 p-4 border-2 border-slate-100 dark:border-slate-700 rounded-xl cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors group">
                    <input type="checkbox" id="goalAccomplished" name="goalAccomplished"
                        class="w-5 h-5 rounded border-slate-300 text-primary focus:ring-primary cursor-pointer">
                    <span
                        class="text-sm font-medium text-slate-600 dark:text-slate-400 group-hover:text-slate-900 dark:group-hover:text-white transition-colors">I
                        accomplished my goals for yesterday!</span>
                </label>

                <div class="space-y-3">
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300">How are you feeling
                        today?</label>
                    <div
                        class="flex flex-wrap gap-2 md:gap-3 p-4 bg-slate-50 dark:bg-slate-900 rounded-2xl border-2 border-slate-100 dark:border-slate-700">
                        <span
                            class="emoji-option text-3xl cursor-pointer p-2 rounded-xl border-2 border-transparent transition-all duration-200 hover:scale-110 active:scale-95"
                            data-mood="😊" title="Happy">😊</span>
                        <span
                            class="emoji-option text-3xl cursor-pointer p-2 rounded-xl border-2 border-transparent transition-all duration-200 hover:scale-110 active:scale-95"
                            data-mood="😐" title="Neutral">😐</span>
                        <span
                            class="emoji-option text-3xl cursor-pointer p-2 rounded-xl border-2 border-transparent transition-all duration-200 hover:scale-110 active:scale-95"
                            data-mood="😟" title="Worried">😟</span>
                        <span
                            class="emoji-option text-3xl cursor-pointer p-2 rounded-xl border-2 border-transparent transition-all duration-200 hover:scale-110 active:scale-95"
                            data-mood="😫" title="Stressed">😫</span>
                        <span
                            class="emoji-option text-3xl cursor-pointer p-2 rounded-xl border-2 border-transparent transition-all duration-200 hover:scale-110 active:scale-95"
                            data-mood="🤗" title="Excited">🤗</span>
                        <span
                            class="emoji-option text-3xl cursor-pointer p-2 rounded-xl border-2 border-transparent transition-all duration-200 hover:scale-110 active:scale-95"
                            data-mood="🤔" title="Thoughtful">🤔</span>
                        <span
                            class="emoji-option text-3xl cursor-pointer p-2 rounded-xl border-2 border-transparent transition-all duration-200 hover:scale-110 active:scale-95"
                            data-mood="😴" title="Tired">😴</span>
                        <span
                            class="emoji-option text-3xl cursor-pointer p-2 rounded-xl border-2 border-transparent transition-all duration-200 hover:scale-110 active:scale-95"
                            data-mood="💪" title="Motivated">💪</span>
                    </div>
                    <input type="hidden" id="mood" name="mood" value="😊">
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-primary hover:bg-primary-dark text-white font-bold py-5 rounded-2xl shadow-lg shadow-primary/20 transition-all duration-300 transform hover:-translate-y-1 active:translate-y-0 text-lg uppercase tracking-wider">
                    Submit Check-in
                </button>
            </form>
        </div>
    </main>

    <script>
        // Theme Toggle Logic
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');

        function updateThemeIcons() {
            if (document.documentElement.classList.contains('dark')) {
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        }

        updateThemeIcons();

        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcons();
        });

        // App Logic
        let userId = localStorage.getItem('userId');
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('userId', userId);
        }

        const emojiOptions = document.querySelectorAll('.emoji-option');
        const moodInput = document.getElementById('mood');

        emojiOptions.forEach(option => {
            option.addEventListener('click', function () {
                emojiOptions.forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                moodInput.value = this.dataset.mood;
            });
        });

        // Load default selected emoji
        emojiOptions[0].classList.add('selected');

        async function loadPreviousCheckin() {
            try {
                const response = await fetch(`/api/checkin/latest?userId=${userId}`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.todayPlan) {
                        document.getElementById('previousWork').value = data.todayPlan;
                    }
                    if (data.streak) {
                        document.getElementById('streakDisplay').classList.remove('hidden');
                        document.getElementById('streakCount').textContent = data.streak;
                    }
                }
            } catch (error) {
                console.error('Error loading previous check-in:', error);
            }
        }

        loadPreviousCheckin();

        document.getElementById('checkinForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');
            const submitButton = document.getElementById('submitBtn');

            submitButton.disabled = true;
            submitButton.innerHTML = `<span class="inline-flex items-center gap-2"><svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Submitting...</span>`;

            const formData = {
                userId: userId,
                previousWork: document.getElementById('previousWork').value,
                todayPlan: document.getElementById('todayPlan').value,
                blockers: document.getElementById('blockers').value,
                mood: document.getElementById('mood').value,
                goalAccomplished: document.getElementById('goalAccomplished').checked
            };

            try {
                const response = await fetch('/api/checkin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    const result = await response.json();
                    successMessage.classList.remove('hidden');
                    if (result.streak) {
                        document.getElementById('streakDisplay').classList.remove('hidden');
                        document.getElementById('streakCount').textContent = result.streak;
                    }
                    setTimeout(() => { successMessage.classList.add('hidden'); }, 4000);
                } else {
                    throw new Error('Submission failed');
                }
            } catch (error) {
                errorMessage.classList.remove('hidden');
                setTimeout(() => { errorMessage.classList.add('hidden'); }, 4000);
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = 'Submit Check-in';
            }
        });
    </script>
</body>

</html>
