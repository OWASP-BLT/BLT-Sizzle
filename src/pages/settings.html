<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sizzle | Settings</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: '#E10101',
                            dark: '#BC0000',
                        },
                        secondary: '#64748b',
                        gray: {
                            200: '#E5E5E5',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Theme Initialization -->
    <script>
        if (localStorage.getItem('theme') === 'dark' ||
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body
    class="bg-gray-50 dark:bg-slate-900 min-h-screen flex flex-col items-center text-slate-900 dark:text-white transition-colors duration-300">
    <!-- Header -->
    <header
        class="fixed top-0 left-0 right-0 z-50 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-gray-200 dark:border-slate-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <nav class="flex items-center justify-between h-16">
                <div class="flex items-center gap-2">
                    <a href="/" class="flex items-center gap-2">
                        <img src="/assets/images/owasp-blt-logo.svg" alt="OWASP BLT Logo" class="h-8 w-auto">
                        <span class="font-bold text-xl tracking-tight hidden sm:block">SIZZLE</span>
                    </a>
                </div>

                <div class="hidden md:flex items-center gap-8">
                    <a href="/"
                        class="text-slate-600 dark:text-slate-300 hover:text-primary transition-colors font-medium">Check-in</a>
                    <a href="/leaderboard"
                        class="text-slate-600 dark:text-slate-300 hover:text-primary transition-colors font-medium">Leaderboard</a>
                    <a href="/settings" class="text-primary font-bold">Settings</a>
                </div>

                <div class="flex items-center gap-4">
                    <button id="themeToggle"
                        class="p-2 text-slate-500 hover:text-primary dark:text-slate-400 dark:hover:text-primary transition-colors">
                        <svg id="sunIcon" class="hidden w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
                            <path fill-rule="evenodd"
                                d="M10 18a.8.8 0 01-.8-.8V16.7a.8.8 0 111.6 0v.5a.8.8 0 01-.8.8zm8-8a.8.8 0 01-.8.8h-.5a.8.8 0 110-1.6h.5a.8.8 0 01.8.8zM10 2a.8.8 0 01.8.8v.5a.8.8 0 11-1.6 0V2.8a.8.8 0 01.8-.8zm-8 8a.8.8 0 01.8-.8h.5a.8.8 0 110 1.6H2.8a.8.8 0 01-.8-.8zm14.5 4.5a.8.8 0 010 1.1l-.4.4a.8.8 0 11-1.1-1.1l.4-.4a.8.8 0 011.1 0zm-11-11a.8.8 0 010 1.1l-.4.4a.8.8 0 01-1.1-1.1l.4-.4a.8.8 0 011.1 0z"
                                clip-rule="evenodd" />
                        </svg>
                        <svg id="moonIcon" class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" />
                        </svg>
                    </button>
                    <!-- Auth Controls -->
                    <div id="authControls" class="hidden items-center gap-3">
                        <span id="userDisplay" class="hidden text-sm font-medium text-slate-600 dark:text-slate-300 sm:block"></span>
                        <button id="logoutBtn"
                            class="hidden text-sm font-medium text-slate-500 hover:text-primary dark:text-slate-400 dark:hover:text-primary transition-colors">
                            Sign out
                        </button>
                        <a id="loginBtn" href="/api/auth/login"
                            class="hidden items-center gap-2 bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-sm font-semibold px-4 py-2 rounded-xl hover:opacity-90 transition-opacity">
                            Login with GitHub
                        </a>
                    </div>
                    <!-- Mobile Menu Button -->
                    <button class="md:hidden p-2 text-slate-600 dark:text-slate-300">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16m-7 6h7"></path>
                        </svg>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <main class="pt-24 pb-12 px-4 w-full max-w-2xl">
        <div
            class="bg-white dark:bg-slate-800 rounded-3xl shadow-xl p-8 md:p-10 text-slate-800 dark:text-slate-100 animate-in fade-in duration-700 border border-gray-100 dark:border-slate-700">
            <header class="mb-8">
                <h1 class="text-4xl font-bold tracking-tight text-slate-900 dark:text-white mb-2">⚙️ Settings</h1>
                <p class="text-slate-500 dark:text-slate-400 text-lg">Configure your notification preferences</p>
            </header>

            <div id="successMessage"
                class="hidden bg-emerald-500 text-white p-4 rounded-xl mb-6 shadow-md border border-emerald-400 flex items-center gap-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
                Settings saved successfully!
            </div>

            <form id="settingsForm" class="space-y-6">
                <div class="space-y-2">
                    <label for="email" class="block text-sm font-bold text-slate-700 dark:text-slate-300">Email
                        Address</label>
                    <input type="email" id="email" name="email"
                        class="w-full p-4 border-2 border-slate-100 dark:border-slate-700 rounded-xl text-slate-700 dark:text-slate-200 focus:outline-none focus:border-primary transition-all duration-200 bg-slate-50 dark:bg-slate-900"
                        placeholder="your@email.com">
                </div>

                <div class="space-y-2">
                    <label for="notificationTime"
                        class="block text-sm font-bold text-slate-700 dark:text-slate-300">Reminder Time (UTC)</label>
                    <input type="time" id="notificationTime" name="notificationTime" value="09:00"
                        class="w-full p-4 border-2 border-slate-100 dark:border-slate-700 rounded-xl text-slate-700 dark:text-slate-200 focus:outline-none focus:border-primary transition-all duration-200 bg-slate-50 dark:bg-slate-900 cursor-pointer">
                </div>

                <div class="space-y-2">
                    <label for="slackWebhook" class="block text-sm font-bold text-slate-700 dark:text-slate-300">Slack
                        Webhook URL</label>
                    <input type="text" id="slackWebhook" name="slackWebhook"
                        class="w-full p-4 border-2 border-slate-100 dark:border-slate-700 rounded-xl text-slate-700 dark:text-slate-200 focus:outline-none focus:border-primary transition-all duration-200 bg-slate-50 dark:bg-slate-900"
                        placeholder="https://hooks.slack.com/services/...">
                </div>

                <div class="pt-4 space-y-4">
                    <button type="submit" id="saveBtn"
                        class="w-full bg-primary hover:bg-primary-dark text-white font-bold py-5 rounded-2xl shadow-lg transition-all duration-300 transform hover:-translate-y-1 active:translate-y-0 text-lg uppercase tracking-wider">
                        Save Settings
                    </button>
                    <button type="button" onclick="testNotification()"
                        class="w-full bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 font-bold py-4 rounded-2xl hover:bg-slate-200 dark:hover:bg-slate-600 transition-all duration-200 uppercase tracking-widest text-xs flex items-center justify-center gap-2">
                        <span class="text-lg">🔔</span> Send Test Notification
                    </button>
                </div>
            </form>
        </div>

        <!-- Organizations Card -->
        <div
            class="mt-6 bg-white dark:bg-slate-800 rounded-3xl shadow-xl p-8 md:p-10 text-slate-800 dark:text-slate-100 border border-gray-100 dark:border-slate-700">
            <header class="mb-6">
                <h2 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white mb-1">🏢 Organizations</h2>
                <p class="text-slate-500 dark:text-slate-400 text-sm">Associate with GitHub organizations. Each org gets
                    its own daily check-in tracking, Slack channel, and optional encryption key.</p>
            </header>

            <div id="orgsList" class="space-y-4 mb-6">
                <p class="text-slate-400 text-sm italic">Loading…</p>
            </div>

            <div class="flex gap-3">
                <input type="text" id="newOrgName"
                    class="flex-1 p-4 border-2 border-slate-100 dark:border-slate-700 rounded-xl text-slate-700 dark:text-slate-200 focus:outline-none focus:border-primary transition-all duration-200 bg-slate-50 dark:bg-slate-900 text-sm"
                    placeholder="github-org-name">
                <button id="addOrgBtn" onclick="addOrg()"
                    class="bg-primary hover:bg-primary-dark text-white font-bold px-6 py-4 rounded-xl transition-all duration-200 text-sm uppercase tracking-wider whitespace-nowrap">
                    Request to Join
                </button>
            </div>
            <p id="orgError" class="hidden text-rose-500 text-xs mt-2"></p>
        </div>
    </main>

    <script>
        // Theme Toggle Logic
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');

        function updateThemeIcons() {
            if (document.documentElement.classList.contains('dark')) {
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        }

        updateThemeIcons();

        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcons();
        });

        let userId = null;

        async function checkAuth() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    const data = await res.json();
                    if (data.authenticated) return data;
                }
            } catch (e) {}
            return null;
        }

        async function loadSettings() {
            try {
                const res = await fetch(`/api/settings?userId=${userId}`);
                if (res.ok) {
                    const s = await res.json();
                    if (s.email) document.getElementById('email').value = s.email;
                    if (s.notificationTime) document.getElementById('notificationTime').value = s.notificationTime;
                    if (s.slackWebhookUrl) document.getElementById('slackWebhook').value = s.slackWebhookUrl;
                }
            } catch (e) {
                console.error(e);
            }
        }

        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const successMessage = document.getElementById('successMessage');

            btn.disabled = true;
            btn.innerHTML = `<span class="inline-flex items-center gap-2"><svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Saving...</span>`;

            const data = {
                userId,
                email: document.getElementById('email').value,
                notificationTime: document.getElementById('notificationTime').value,
                slackWebhookUrl: document.getElementById('slackWebhook').value
            };

            try {
                const res = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    successMessage.classList.remove('hidden');
                    setTimeout(() => successMessage.classList.add('hidden'), 4000);
                }
            } catch (e) {
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save Settings';
            }
        });

        async function testNotification() {
            try {
                const res = await fetch(`/api/notification/test?userId=${userId}`, { method: 'POST' });
                if (res.ok) {
                    alert('Test notification sent to your configured Slack webhook!');
                } else {
                    alert('Failed to send test notification. Check your webhook URL.');
                }
            } catch (e) {
                alert('An error occurred. Please check the console.');
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/';
        });

        // Initialise
        (async () => {
            const authControls = document.getElementById('authControls');
            const loginBtn = document.getElementById('loginBtn');
            const userDisplay = document.getElementById('userDisplay');
            const logoutBtn = document.getElementById('logoutBtn');

            authControls.classList.remove('hidden');
            authControls.classList.add('flex');

            const authData = await checkAuth();
            if (!authData) return;

            userId = authData.userId;
            userDisplay.textContent = authData.displayName;
            userDisplay.classList.remove('hidden');
            logoutBtn.classList.remove('hidden');

            await loadSettings();
            await loadOrgs();
        })();

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.appendChild(document.createTextNode(String(str || '')));
            return d.innerHTML;
        }

        async function loadOrgs() {
            const list = document.getElementById('orgsList');
            let data;
            try {
                const res = await fetch('/api/orgs');
                if (!res.ok) { list.innerHTML = '<p class="text-rose-400 text-sm">Failed to load organizations.</p>'; return; }
                data = await res.json();
            } catch (e) {
                list.innerHTML = '<p class="text-rose-400 text-sm">Error loading organizations.</p>'; return;
            }

            if (!data.orgs || data.orgs.length === 0) {
                list.innerHTML = '<p class="text-slate-400 dark:text-slate-500 text-sm italic">No organizations linked yet.</p>';
                return;
            }

            const approved = data.orgs.filter(o => o.status === 'approved');
            const pending  = data.orgs.filter(o => o.status !== 'approved');

            let html = '';

            pending.forEach(org => {
                html += `
                <div class="flex items-center justify-between gap-4 rounded-2xl border border-amber-200 dark:border-amber-800 bg-amber-50 dark:bg-amber-900/20 px-4 py-3">
                    <div>
                        <span class="font-semibold text-sm text-slate-800 dark:text-slate-100">${escapeHtml(org.name)}</span>
                        <span class="ml-2 text-xs text-amber-600 dark:text-amber-400 font-bold uppercase">Pending approval</span>
                    </div>
                    <button onclick="leaveOrg('${escapeHtml(org.name)}')"
                        class="text-xs text-slate-400 hover:text-rose-500 font-bold uppercase tracking-wider transition-colors">Cancel</button>
                </div>`;
            });

            for (const org of approved) {
                // Fetch members in parallel (fire-and-forget rendered later)
                html += `
                <div class="rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 p-4" id="org-row-${org.id}">
                    <div class="flex items-center justify-between gap-4 mb-3">
                        <div class="flex items-center gap-2">
                            <span class="font-semibold text-sm text-slate-800 dark:text-slate-100">${escapeHtml(org.name)}</span>
                            <span class="text-xs text-emerald-600 dark:text-emerald-400 font-bold uppercase">Approved</span>
                            ${org.hasOrgKey ? '<span class="text-xs text-violet-600 dark:text-violet-400 font-bold uppercase">🔑 Encrypted</span>' : ''}
                        </div>
                        <button onclick="leaveOrg('${escapeHtml(org.name)}')"
                            class="text-xs text-rose-500 hover:text-rose-700 font-bold uppercase tracking-wider transition-colors">Leave</button>
                    </div>

                    <!-- Slack webhook -->
                    <div class="flex gap-2 mb-2">
                        <input type="text" id="slack-${org.id}" value="${escapeHtml(org.slackWebhookUrl || '')}"
                            placeholder="https://hooks.slack.com/services/…"
                            class="flex-1 text-xs p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 focus:outline-none focus:border-primary">
                        <button onclick="saveOrgSettings('${escapeHtml(org.name)}', ${org.id})"
                            class="text-xs bg-slate-700 dark:bg-white text-white dark:text-slate-900 font-bold px-4 rounded-xl hover:opacity-80 transition-opacity">Save Slack</button>
                    </div>

                    <!-- Org encryption key -->
                    <details class="mt-2 text-xs">
                        <summary class="cursor-pointer text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 select-none">
                            🔑 ${org.hasOrgKey ? 'Change / clear org encryption key' : 'Set org encryption key (optional)'}
                        </summary>
                        <div class="mt-2 space-y-1">
                            <p class="text-slate-400 dark:text-slate-500">All approved members share this passphrase. Check-ins tagged to this org are encrypted with it as a second layer. Leave blank to remove.</p>
                            <div class="flex gap-2 mt-1">
                                <input type="password" id="orgkey-${org.id}" autocomplete="new-password"
                                    placeholder="${org.hasOrgKey ? '(keep existing — type new to change)' : 'passphrase…'}"
                                    class="flex-1 p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 focus:outline-none focus:border-primary">
                                <button onclick="saveOrgKey('${escapeHtml(org.name)}', ${org.id})"
                                    class="text-xs bg-violet-600 hover:bg-violet-700 text-white font-bold px-4 rounded-xl transition-colors">Set Key</button>
                            </div>
                        </div>
                    </details>

                    <!-- Pending members -->
                    <div id="pending-${org.id}" class="mt-3"></div>
                </div>`;
            }

            list.innerHTML = html;

            // Load pending members for each approved org
            for (const org of approved) {
                loadPendingMembers(org.name, org.id);
            }
        }

        async function loadPendingMembers(orgName, orgId) {
            const container = document.getElementById(`pending-${orgId}`);
            if (!container) return;
            try {
                const res = await fetch(`/api/orgs/${encodeURIComponent(orgName)}/members`);
                if (!res.ok) return;
                const data = await res.json();
                const pendingMembers = (data.members || []).filter(m => m.status === 'pending');
                if (pendingMembers.length === 0) return;

                container.innerHTML = `
                    <div class="border-t border-slate-200 dark:border-slate-700 pt-3 mt-1">
                        <p class="text-xs font-bold text-amber-600 dark:text-amber-400 uppercase tracking-wider mb-2">
                            ${pendingMembers.length} pending request${pendingMembers.length > 1 ? 's' : ''}
                        </p>
                        <div class="space-y-2">
                            ${pendingMembers.map(m => `
                            <div class="flex items-center justify-between gap-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2">
                                <span class="text-xs font-mono text-slate-700 dark:text-slate-200">${escapeHtml(m.user_id)}</span>
                                <div class="flex gap-2">
                                    <button onclick="approveOrDeny('${escapeHtml(orgName)}', '${escapeHtml(m.user_id)}', 'approve', ${orgId})"
                                        class="text-xs bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-3 py-1 rounded-lg transition-colors">Approve</button>
                                    <button onclick="approveOrDeny('${escapeHtml(orgName)}', '${escapeHtml(m.user_id)}', 'deny', ${orgId})"
                                        class="text-xs bg-rose-500 hover:bg-rose-600 text-white font-bold px-3 py-1 rounded-lg transition-colors">Deny</button>
                                </div>
                            </div>`).join('')}
                        </div>
                    </div>`;
            } catch (e) { /* silent */ }
        }

        async function approveOrDeny(orgName, targetUserId, action, orgId) {
            await fetch(`/api/orgs/${encodeURIComponent(orgName)}/members/${encodeURIComponent(targetUserId)}/${action}`, { method: 'POST' });
            loadPendingMembers(orgName, orgId);
        }

        async function addOrg() {
            const input = document.getElementById('newOrgName');
            const errEl = document.getElementById('orgError');
            const btn = document.getElementById('addOrgBtn');
            const orgName = input.value.trim().toLowerCase();
            errEl.classList.add('hidden');
            if (!orgName) return;
            btn.disabled = true;
            btn.textContent = '…';
            try {
                const res = await fetch('/api/orgs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ orgName })
                });
                const data = await res.json();
                if (res.ok || res.status === 202) {
                    input.value = '';
                    await loadOrgs();
                    if (data.pending) {
                        errEl.textContent = data.message || 'Join request sent — pending approval.';
                        errEl.classList.remove('hidden');
                        errEl.classList.replace('text-rose-500', 'text-amber-500');
                    }
                } else {
                    errEl.textContent = data.error || 'Failed to join organization';
                    errEl.classList.add('text-rose-500');
                    errEl.classList.remove('text-amber-500');
                    errEl.classList.remove('hidden');
                }
            } finally {
                btn.disabled = false;
                btn.textContent = 'Request to Join';
            }
        }

        async function leaveOrg(orgName) {
            if (!confirm(`Leave organization "${orgName}"?`)) return;
            await fetch(`/api/orgs/${encodeURIComponent(orgName)}`, { method: 'DELETE' });
            await loadOrgs();
        }

        async function saveOrgSettings(orgName, orgId) {
            const slackWebhookUrl = document.getElementById(`slack-${orgId}`).value.trim();
            const res = await fetch(`/api/orgs/${encodeURIComponent(orgName)}/settings`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ slackWebhookUrl })
            });
            const input = document.getElementById(`slack-${orgId}`);
            if (res.ok) {
                input.style.borderColor = '#22c55e';
                setTimeout(() => { input.style.borderColor = ''; }, 1500);
            }
        }

        async function saveOrgKey(orgName, orgId) {
            const input = document.getElementById(`orgkey-${orgId}`);
            const orgKey = input.value;  // may be empty string to clear
            const res = await fetch(`/api/orgs/${encodeURIComponent(orgName)}/settings`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ orgKey })
            });
            if (res.ok) {
                input.value = '';
                input.style.borderColor = '#22c55e';
                setTimeout(() => { input.style.borderColor = ''; loadOrgs(); }, 1200);
            }
        }
    </script>
</body>

</html>

    <script>
        // Theme Toggle Logic
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');

        function updateThemeIcons() {
            if (document.documentElement.classList.contains('dark')) {
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        }

        updateThemeIcons();

        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcons();
        });

        let userId = null;

        async function checkAuth() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    const data = await res.json();
                    if (data.authenticated) return data;
                }
            } catch (e) {}
            return null;
        }

        async function loadSettings() {
            try {
                const res = await fetch(`/api/settings?userId=${userId}`);
                if (res.ok) {
                    const s = await res.json();
                    if (s.email) document.getElementById('email').value = s.email;
                    if (s.notificationTime) document.getElementById('notificationTime').value = s.notificationTime;
                    if (s.slackWebhookUrl) document.getElementById('slackWebhook').value = s.slackWebhookUrl;
                }
            } catch (e) {
                console.error(e);
            }
        }

        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const successMessage = document.getElementById('successMessage');

            btn.disabled = true;
            btn.innerHTML = `<span class="inline-flex items-center gap-2"><svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Saving...</span>`;

            const data = {
                userId,
                email: document.getElementById('email').value,
                notificationTime: document.getElementById('notificationTime').value,
                slackWebhookUrl: document.getElementById('slackWebhook').value
            };

            try {
                const res = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    successMessage.classList.remove('hidden');
                    setTimeout(() => successMessage.classList.add('hidden'), 4000);
                }
            } catch (e) {
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save Settings';
            }
        });

        async function testNotification() {
            try {
                const res = await fetch(`/api/notification/test?userId=${userId}`, { method: 'POST' });
                if (res.ok) {
                    alert('Test notification sent to your configured Slack webhook!');
                } else {
                    alert('Failed to send test notification. Check your webhook URL.');
                }
            } catch (e) {
                alert('An error occurred. Please check the console.');
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/';
        });

        // Initialise
        (async () => {
            const authControls = document.getElementById('authControls');
            const loginBtn = document.getElementById('loginBtn');
            const userDisplay = document.getElementById('userDisplay');
            const logoutBtn = document.getElementById('logoutBtn');

            authControls.classList.remove('hidden');
            authControls.classList.add('flex');

            const authData = await checkAuth();
            if (!authData) return;

            userId = authData.userId;
            userDisplay.textContent = authData.displayName;
            userDisplay.classList.remove('hidden');
            logoutBtn.classList.remove('hidden');

            await loadSettings();
            await loadOrgs();
        })();

        async function loadOrgs() {
            const list = document.getElementById('orgsList');
            try {
                const res = await fetch('/api/orgs');
                if (!res.ok) {
                    list.innerHTML = '<p class="text-rose-400 text-sm">Failed to load organizations.</p>';
                    return;
                }
                const data = await res.json();
                if (!data.orgs || data.orgs.length === 0) {
                    list.innerHTML = '<p class="text-slate-400 dark:text-slate-500 text-sm italic">No organizations linked yet.</p>';
                    return;
                }
                list.innerHTML = data.orgs.map(org => `
                    <div class="bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-2xl p-4" id="org-row-${org.id}">
                        <div class="flex items-center justify-between gap-4 mb-3">
                            <span class="font-semibold text-slate-800 dark:text-slate-100 text-sm">${escapeHtml(org.name)}</span>
                            <button onclick="leaveOrg('${escapeHtml(org.name)}')"
                                class="text-xs text-rose-500 hover:text-rose-700 font-bold uppercase tracking-wider transition-colors">Leave</button>
                        </div>
                        <div class="flex gap-2">
                            <input type="text" id="slack-${org.id}" value="${escapeHtml(org.slackWebhookUrl || '')}"
                                placeholder="https://hooks.slack.com/services/…"
                                class="flex-1 text-xs p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 focus:outline-none focus:border-primary">
                            <button onclick="saveOrgSlack('${escapeHtml(org.name)}', ${org.id})"
                                class="text-xs bg-slate-800 dark:bg-white text-white dark:text-slate-900 font-bold px-4 rounded-xl hover:opacity-80 transition-opacity">Save</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                list.innerHTML = '<p class="text-rose-400 text-sm">Error loading organizations.</p>';
            }
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.appendChild(document.createTextNode(str));
            return d.innerHTML;
        }

        async function addOrg() {
            const input = document.getElementById('newOrgName');
            const errEl = document.getElementById('orgError');
            const btn = document.getElementById('addOrgBtn');
            const orgName = input.value.trim().toLowerCase();
            errEl.classList.add('hidden');
            if (!orgName) return;
            btn.disabled = true;
            btn.textContent = '…';
            try {
                const res = await fetch('/api/orgs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ orgName })
                });
                const data = await res.json();
                if (res.ok) {
                    input.value = '';
                    await loadOrgs();
                } else {
                    errEl.textContent = data.error || 'Failed to join organization';
                    errEl.classList.remove('hidden');
                }
            } finally {
                btn.disabled = false;
                btn.textContent = 'Join Org';
            }
        }

        async function leaveOrg(orgName) {
            if (!confirm(`Leave organization "${orgName}"? You will no longer be counted in its daily check-in tracking.`)) return;
            const res = await fetch(`/api/orgs/${encodeURIComponent(orgName)}`, { method: 'DELETE' });
            if (res.ok) await loadOrgs();
        }

        async function saveOrgSlack(orgName, orgId) {
            const input = document.getElementById(`slack-${orgId}`);
            const slackWebhookUrl = input.value.trim();
            const res = await fetch(`/api/orgs/${encodeURIComponent(orgName)}/settings`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ slackWebhookUrl })
            });
            if (res.ok) {
                input.style.borderColor = '#22c55e';
                setTimeout(() => { input.style.borderColor = ''; }, 1500);
            }
        }
    </script>
</body>

</html>
