<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sizzle | Time Logs</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: '#E10101',
                            dark: '#BC0000',
                        },
                        secondary: '#64748b',
                        gray: {
                            200: '#E5E5E5',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Theme Initialization -->
    <script>
        if (localStorage.getItem('theme') === 'dark' ||
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body
    class="bg-gray-50 dark:bg-slate-900 min-h-screen flex flex-col items-center text-slate-900 dark:text-white transition-colors duration-300">
    <!-- Header -->
    <header
        class="fixed top-0 left-0 right-0 z-50 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-gray-200 dark:border-slate-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <nav class="flex items-center justify-between h-16">
                <div class="flex items-center gap-2">
                    <a href="/" class="flex items-center gap-2">
                        <img src="/assets/images/owasp-blt-logo.svg" alt="OWASP BLT Logo" class="h-8 w-auto">
                        <span class="font-bold text-xl tracking-tight hidden sm:block">SIZZLE</span>
                    </a>
                </div>

                <div class="hidden md:flex items-center gap-8">
                    <a href="/"
                        class="text-slate-600 dark:text-slate-300 hover:text-primary transition-colors font-medium">Check-in</a>
                    <a href="/leaderboard"
                        class="text-slate-600 dark:text-slate-300 hover:text-primary transition-colors font-medium">Leaderboard</a>
                    <a href="/time-logs" class="text-primary font-bold">Time Logs</a>
                    <a href="/settings"
                        class="text-slate-600 dark:text-slate-300 hover:text-primary transition-colors font-medium">Settings</a>
                </div>

                <div class="flex items-center gap-4">
                    <button id="themeToggle"
                        class="p-2 text-slate-500 hover:text-primary dark:text-slate-400 dark:hover:text-primary transition-colors">
                        <svg id="sunIcon" class="hidden w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
                            <path fill-rule="evenodd"
                                d="M10 18a.8.8 0 01-.8-.8V16.7a.8.8 0 111.6 0v.5a.8.8 0 01-.8.8zm8-8a.8.8 0 01-.8.8h-.5a.8.8 0 110-1.6h.5a.8.8 0 01.8.8zM10 2a.8.8 0 01.8.8v.5a.8.8 0 11-1.6 0V2.8a.8.8 0 01.8-.8zm-8 8a.8.8 0 01.8-.8h.5a.8.8 0 110 1.6H2.8a.8.8 0 01-.8-.8zm14.5 4.5a.8.8 0 010 1.1l-.4.4a.8.8 0 11-1.1-1.1l.4-.4a.8.8 0 011.1 0zm-11-11a.8.8 0 010 1.1l-.4.4a.8.8 0 01-1.1-1.1l.4-.4a.8.8 0 011.1 0z"
                                clip-rule="evenodd" />
                        </svg>
                        <svg id="moonIcon" class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" />
                        </svg>
                    </button>
                    <!-- Auth Controls -->
                    <div id="authControls" class="hidden items-center gap-3">
                        <span id="userDisplay" class="hidden text-sm font-medium text-slate-600 dark:text-slate-300 sm:block"></span>
                        <button id="logoutBtn"
                            class="hidden text-sm font-medium text-slate-500 hover:text-primary dark:text-slate-400 dark:hover:text-primary transition-colors">
                            Sign out
                        </button>
                        <a id="loginBtn" href="/api/auth/login"
                            class="hidden items-center gap-2 bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-sm font-semibold px-4 py-2 rounded-xl hover:opacity-90 transition-opacity">
                            Login with GitHub
                        </a>
                    </div>
                    <!-- Mobile Menu Button -->
                    <button class="md:hidden p-2 text-slate-600 dark:text-slate-300">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16m-7 6h7"></path>
                        </svg>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <main class="pt-24 pb-12 px-4 w-full max-w-4xl">
        <div
            class="bg-white dark:bg-slate-800 rounded-3xl shadow-xl p-8 md:p-10 text-slate-800 dark:text-slate-100 animate-in fade-in duration-700 border border-gray-100 dark:border-slate-700">
            <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-4xl font-bold tracking-tight text-slate-900 dark:text-white mb-2">⏱️ Time Tracker
                    </h1>
                    <p class="text-slate-500 dark:text-slate-400 text-lg">Focus on your tasks, we'll keep track</p>
                </div>
                <div id="activeTimer"
                    class="hidden flex items-center bg-primary/10 px-6 py-3 rounded-2xl border-2 border-primary/20 animate-pulse">
                    <span class="w-3 h-3 bg-primary rounded-full mr-3"></span>
                    <span class="text-primary font-bold tracking-mono text-xl" id="timerDisplay">00:00:00</span>
                </div>
            </header>

            <section
                class="bg-slate-50 dark:bg-slate-900 rounded-2xl p-6 border-2 border-slate-100 dark:border-slate-700 mb-10 shadow-inner">
                <div class="grid grid-cols-1 md:grid-cols-[1fr_auto] gap-4">
                    <input type="text" id="issueUrl"
                        placeholder="GitHub Issue URL (e.g. https://github.com/org/repo/issues/1)"
                        class="w-full p-4 border-2 border-slate-200 dark:border-slate-700 rounded-xl text-slate-700 dark:text-slate-200 focus:outline-none focus:border-primary transition-all duration-200 bg-white dark:bg-slate-800">
                    <button id="timerBtn" onclick="toggleTimer()"
                        class="bg-primary hover:bg-primary-dark text-white font-bold px-8 py-4 rounded-xl shadow-lg transition-all duration-300 transform hover:-translate-y-1 active:translate-y-0 disabled:opacity-50">
                        Start Timer
                    </button>
                </div>
            </section>

            <section>
                <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-6 flex items-center gap-2">
                    <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    Recent Activity
                </h2>
                <div class="overflow-hidden rounded-2xl border-2 border-slate-100 dark:border-slate-700">
                    <table class="w-full text-left">
                        <thead
                            class="bg-slate-50 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400 uppercase text-xs font-black tracking-widest border-b-2 border-slate-100 dark:border-slate-700">
                            <tr>
                                <th class="px-6 py-4">Start Time</th>
                                <th class="px-6 py-4">Duration</th>
                                <th class="px-6 py-4 text-right">Issue</th>
                            </tr>
                        </thead>
                        <tbody id="logsList" class="divide-y divide-slate-100 dark:divide-slate-700">
                            <tr>
                                <td colspan="3" class="px-6 py-12 text-center text-slate-400 font-medium">Loading your
                                    logs...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script>
        // Theme Toggle Logic
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');

        function updateThemeIcons() {
            if (document.documentElement.classList.contains('dark')) {
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        }

        updateThemeIcons();

        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcons();
        });

        let userId = null;
        let timerInterval;
        let startTime;
        let isRunning = false;

        async function checkAuth() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    const data = await res.json();
                    if (data.authenticated) return data;
                }
            } catch (e) {}
            return null;
        }

        async function toggleTimer() {
            const btn = document.getElementById('timerBtn');
            const issueUrl = document.getElementById('issueUrl').value;
            const timerCard = document.getElementById('activeTimer');

            btn.disabled = true;

            if (!isRunning) {
                try {
                    const res = await fetch('/api/timelog/start', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId, githubIssueUrl: issueUrl })
                    });
                    if (res.ok) {
                        const data = await res.json();
                        isRunning = true;
                        startTime = new Date(data.startTime || new Date());
                        btn.textContent = 'Stop Timer';
                        btn.classList.add('bg-slate-800');
                        btn.classList.remove('bg-primary');
                        timerCard.classList.remove('hidden');
                        startTimer();
                    }
                } catch (e) {
                    console.error(e);
                }
            } else {
                try {
                    const res = await fetch('/api/timelog/stop', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId })
                    });
                    if (res.ok) {
                        isRunning = false;
                        clearInterval(timerInterval);
                        btn.textContent = 'Start Timer';
                        btn.classList.remove('bg-slate-800');
                        btn.classList.add('bg-primary');
                        timerCard.classList.add('hidden');
                        document.getElementById('timerDisplay').textContent = '00:00:00';
                        loadLogs();
                    }
                } catch (e) {
                    console.error(e);
                }
            }
            btn.disabled = false;
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const now = new Date();
                const diff = new Date(now - startTime);
                const h = String(diff.getUTCHours()).padStart(2, '0');
                const m = String(diff.getUTCMinutes()).padStart(2, '0');
                const s = String(diff.getUTCSeconds()).padStart(2, '0');
                document.getElementById('timerDisplay').textContent = `${h}:${m}:${s}`;
            }, 1000);
        }

        async function loadLogs() {
            const list = document.getElementById('logsList');
            try {
                const response = await fetch(`/api/timelogs?userId=${userId}`);
                if (!response.ok) throw new Error('Failed to fetch');
                const data = await response.json();

                if (data.logs && data.logs.length > 0) {
                    list.innerHTML = data.logs.map(log => {
                        const date = new Date(log.start_time).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
                        const time = new Date(log.start_time).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
                        const duration = log.duration_seconds ?
                            (log.duration_seconds < 3600 ?
                                Math.floor(log.duration_seconds / 60) + 'm' :
                                Math.floor(log.duration_seconds / 3600) + 'h ' + Math.floor((log.duration_seconds % 3600) / 60) + 'm'
                            ) : '<span class="text-primary font-bold pulse">Active</span>';

                        return `
                        <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors group">
                            <td class="px-6 py-5">
                                <div class="flex flex-col">
                                    <span class="font-bold text-slate-800 dark:text-slate-200">${date}</span>
                                    <span class="text-xs text-slate-400">${time}</span>
                                </div>
                            </td>
                            <td class="px-6 py-5">
                                <span class="bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 px-3 py-1 rounded-full text-sm font-bold">${duration}</span>
                            </td>
                            <td class="px-6 py-5 text-right">
                                ${log.github_issue_url ?
                                `<a href="${log.github_issue_url}" target="_blank" class="inline-flex items-center gap-1 text-xs font-bold text-primary hover:text-primary-dark underline underline-offset-4 decoration-2">
                                        View Issue <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                                    </a>` :
                                '<span class="text-slate-300 dark:text-slate-600">-</span>'
                            }
                            </td>
                        </tr>
                    `}).join('');
                } else {
                    list.innerHTML = '<tr><td colspan="3" class="px-6 py-12 text-center text-slate-400 font-medium">No logs found yet. Start your first session!</td></tr>';
                }
            } catch (e) {
                list.innerHTML = '<tr><td colspan="3" class="px-6 py-12 text-center text-rose-500 font-bold">Failed to load logs.</td></tr>';
            }
        }

        // Initialise
        (async () => {
            const authControls = document.getElementById('authControls');
            const loginBtn = document.getElementById('loginBtn');
            const userDisplay = document.getElementById('userDisplay');
            const logoutBtn = document.getElementById('logoutBtn');

            authControls.classList.remove('hidden');
            authControls.classList.add('flex');

            const authData = await checkAuth();
            if (!authData) {
                loginBtn.classList.remove('hidden');
                loginBtn.classList.add('inline-flex');
                // Disable timer controls and show login prompt
                document.getElementById('timerBtn').disabled = true;
                document.getElementById('logsList').innerHTML =
                    '<tr><td colspan="3" class="px-6 py-12 text-center text-slate-400 font-bold">Please <a href="/api/auth/login" class="text-primary underline">login with GitHub</a> to track time.</td></tr>';
                return;
            }

            userId = authData.userId;
            userDisplay.textContent = authData.displayName;
            userDisplay.classList.remove('hidden');
            logoutBtn.classList.remove('hidden');
            logoutBtn.addEventListener('click', async () => {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/';
            });

            await loadLogs();
        })();
    </script>
</body>

</html>
