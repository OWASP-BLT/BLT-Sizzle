name = "blt-sizzle-checkin"
main = "src/index.py"
compatibility_date = "2024-01-01"
compatibility_flags = ["python_workers"]

# Scheduled notifications - runs every hour to check for users needing reminders
[triggers]
crons = ["0 * * * *"]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "checkin-db"
database_id = "placeholder-database-id"

# KV namespace for sessions (optional)
[[kv_namespaces]]
binding = "KV"
id = "placeholder-kv-id"

# Use secrets for encryption key in production:
# wrangler secret put ENCRYPTION_KEY
# 
# For development only, you can uncomment and set a key here:
# [vars]
# ENCRYPTION_KEY = "development-key-only-not-for-production"
