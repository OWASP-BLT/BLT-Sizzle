name = "blt-sizzle"
main = "workers/main.py"
compatibility_date = "2024-04-03"
compatibility_flags = ["python_workers"]

# Scheduled notifications - runs every hour to check for users needing reminders
[triggers]
crons = ["0 * * * *"]

# D1 Database binding
[[d1_databases]]
binding = "sizzle_db"
database_name = "sizzle-db"
database_id = "cdf3005e-b7bc-4f56-8d71-ea8ca93f5f88"
migrations_dir = "migrations"

# Configure assets (static files)
[assets]
directory = "src"
binding = "ASSETS"

[vars]
WORKER_HOST = "blt-sizzle.workers.dev"
# EMAIL_API_KEY = ""
# EMAIL_FROM = ""
# EMAIL_PROVIDER = "sendgrid"

# Use secrets for encryption key in production:
# wrangler secret put ENCRYPTION_KEY
# 
# For development only, you can uncomment and set a key here:
# [vars]
# ENCRYPTION_KEY = "development-key-only-not-for-production"
